<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla Smooth</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
        
        #container { 
            width:100%; 
            height:100vh; 
            position:relative; 
            background:#000; 
        }

        iframe {
            position: absolute; top:0; left:0; width:100%; height:100%;
            border:none;
            transition: opacity 0.2s ease-in-out;
            will-change: opacity;
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            background: #000;
        }

        .hidden { 
            opacity: 0; 
            z-index: 1; 
            pointer-events: none; 
        }
        .visible { 
            opacity: 1; 
            z-index: 2; 
        }

        #speed {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 8px 25px;
            border-radius: 50px; font-size: 32px; font-weight: bold; z-index: 100;
            border: 2px solid #222; pointer-events: none;
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>
    <div id="container">
        <iframe id="wazeA" class="visible" src="about:blank" allow="geolocation" allowfullscreen></iframe>
        <iframe id="wazeB" class="hidden" src="about:blank" allow="geolocation" allowfullscreen></iframe>
        
        <div id="speed">0</div>
    </div>

    <script>
        let active = document.getElementById('wazeA');
        let hidden = document.getElementById('wazeB');
        const speedEl = document.getElementById('speed');

        let lastLat = 43.65;
        let lastLon = -79.38;
        let lastUpdate = 0;

        const UPDATE_INTERVAL = 5500;
        const MIN_DISTANCE = 75;
        const SWAP_DELAY_AFTER_LOAD = 350;   // ← You can change this (150-400)

        function distance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + 
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function buildUrl(lat, lon) {
            return `https://embed.waze.com/iframe?zoom=16&lat=${lat.toFixed(6)}&lon=${lon.toFixed(6)}&pin=1&ct=livemap&language_code=en&darkmode=1`;
        }

        function forceRefreshIframe(iframe) {
            iframe.src = 'about:blank';
            setTimeout(() => iframe.src = buildUrl(lastLat, lastLon), 80);
        }

        function instantSwap() {
            hidden.style.transition = 'none';
            active.style.transition = 'none';

            [active, hidden] = [hidden, active];

            active.className = 'visible';
            hidden.className = 'hidden';

            setTimeout(() => {
                active.style.transition = 'opacity 0.2s ease-in-out';
                hidden.style.transition = 'opacity 0.2s ease-in-out';
            }, 50);
        }

        function updateMap(lat, lon) {
            const now = Date.now();
            if (now - lastUpdate < UPDATE_INTERVAL) return;

            const dist = distance(lastLat, lastLon, lat, lon);
            if (dist < MIN_DISTANCE) return;

            hidden.src = buildUrl(lat, lon);

            const timeout = setTimeout(() => {
                instantSwap();
                lastLat = lat; 
                lastLon = lon; 
                lastUpdate = now;
                localStorage.setItem('lastWazeLat', lat);
                localStorage.setItem('lastWazeLon', lon);
            }, 4200);

            hidden.onload = () => {
                clearTimeout(timeout);
                
                setTimeout(() => {
                    instantSwap();
                    lastLat = lat;
                    lastLon = lon;
                    lastUpdate = now;
                    localStorage.setItem('lastWazeLat', lat);
                    localStorage.setItem('lastWazeLon', lon);
                }, SWAP_DELAY_AFTER_LOAD);
            };

            hidden.onerror = () => {
                clearTimeout(timeout);
                forceRefreshIframe(hidden);
            };
        }

        function preloadLastPosition() {
            const savedLat = localStorage.getItem('lastWazeLat');
            const savedLon = localStorage.getItem('lastWazeLon');
            if (savedLat && savedLon) {
                lastLat = parseFloat(savedLat);
                lastLon = parseFloat(savedLon);
            }
            active.src = buildUrl(lastLat, lastLon);
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                speedEl.textContent = kmh;

                updateMap(latitude, longitude);
            },
            err => console.error('Geolocation error:', err),
            { enableHighAccuracy: true, maximumAge: 800, timeout: 8000 });
        }

        preloadLastPosition();

        // Safety refresh
        setInterval(() => {
            if (Date.now() - lastUpdate > 45000) {
                forceRefreshIframe(active);
            }
        }, 45000);
    </script>
</body>
</html>
