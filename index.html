<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla Optimized</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
        #container { width:100%; height:100vh; position:relative; background:#000; }

        iframe {
            position: absolute; top:0; left:0; width:100%; height:100%;
            border:none; background:#000;
            transition: opacity 0.28s ease-in-out;
            will-change: opacity;
        }

        .visible { opacity: 1; z-index: 5; }
        .hidden  { opacity: 0; z-index: 1; }

        #speed {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.88); color: #00ff41; padding: 8px 34px;
            border-radius: 50px; font-size: 46px; font-weight: bold; z-index: 100;
            border: 2px solid #00ff41; pointer-events: none;
            box-shadow: 0 0 20px rgba(0,255,65,0.5);
            text-shadow: 0 0 10px rgba(0,255,65,0.7);
        }

        #status {
            position: absolute; top: 15px; left: 15px; color: #aaa; font-size: 13px; z-index: 100;
            background: rgba(0,0,0,0.65); padding: 5px 12px; border-radius: 6px;
        }

        .dark-filter {
            filter: brightness(0.82) contrast(1.18) saturate(0.92);
        }
    </style>
</head>
<body>
    <div id="container">
        <iframe id="wazeA" class="visible" src="about:blank" allowfullscreen></iframe>
        <iframe id="wazeB" class="hidden"  src="about:blank" allowfullscreen></iframe>
        <div id="speed">0</div>
        <div id="status">Initializing...</div>
    </div>

    <script>
        let active = document.getElementById('wazeA');
        let hidden = document.getElementById('wazeB');
        const speedEl = document.getElementById('speed');
        const statusEl = document.getElementById('status');

        let lastLat = 43.65;
        let lastLon = -79.38;
        let lastUpdate = 0;
        let isUpdating = false;
        let memoryCounter = 0;
        let currentSpeed = 0;

        const UPDATE_INTERVAL = 4000;
        const MIN_DISTANCE = 55;

        function distance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function isNight() {
            const hour = new Date().getHours();
            return hour < 7 || hour > 20;
        }

        function getZoomForSpeed(speedKmh) {
            if (speedKmh < 50) return 16.3;      // City - best for alerts/icons
            if (speedKmh < 85) return 15.7;      // Urban highway
            return 15.2;                         // Highway - wide view
        }

        function buildUrl(lat, lon) {
            const zoom = getZoomForSpeed(currentSpeed);
            let url = `https://embed.waze.com/iframe?zoom=${zoom}&lat=${lat.toFixed(6)}&lon=${lon.toFixed(6)}`;
            url += '&pin=1&ct=livemap&language_code=en-GB';
            
            if (isNight()) url += '&dark=true';
            return url;
        }

        function applyDarkMode() {
            const isDark = isNight();
            active.classList.toggle('dark-filter', isDark);
            hidden.classList.toggle('dark-filter', isDark);
        }

        function cleanMemory(iframe) {
            if (!iframe) return;
            iframe.src = 'about:blank';
            setTimeout(() => {
                try { iframe.contentWindow?.location?.replace('about:blank'); } catch(e){}
            }, 100);
        }

        function executeSwap(lat, lon, msg) {
            hidden.classList.add('visible');
            hidden.classList.remove('hidden');

            setTimeout(() => {
                active.classList.add('hidden');
                active.classList.remove('visible');

                [active, hidden] = [hidden, active];

                lastLat = lat;
                lastLon = lon;
                lastUpdate = Date.now();
                isUpdating = false;

                localStorage.setItem('lastWazeLat', lat);
                localStorage.setItem('lastWazeLon', lon);
                statusEl.textContent = msg;

                applyDarkMode();

                memoryCounter++;
                if (memoryCounter >= 6) {
                    cleanMemory(hidden);
                    memoryCounter = 0;
                }
            }, 280);
        }

        function updateMap(lat, lon) {
            const now = Date.now();
            if (isUpdating || (now - lastUpdate < UPDATE_INTERVAL)) return;

            const dist = distance(lastLat, lastLon, lat, lon);
            if (dist < MIN_DISTANCE) return;

            isUpdating = true;
            statusEl.textContent = 'Loading map...';

            cleanMemory(hidden);
            hidden.src = buildUrl(lat, lon);

            const timeout = setTimeout(() => {
                executeSwap(lat, lon, 'Updated');
            }, 6000);

            hidden.onload = () => {
                clearTimeout(timeout);
                setTimeout(() => executeSwap(lat, lon, 'Alerts updated ✓'), 500);
            };
        }

        function preload() {
            const savedLat = localStorage.getItem('lastWazeLat');
            const savedLon = localStorage.getItem('lastWazeLon');
            if (savedLat && savedLon) {
                lastLat = parseFloat(savedLat);
                lastLon = parseFloat(savedLon);
            }
            active.src = buildUrl(lastLat, lastLon);
            lastUpdate = Date.now();
            applyDarkMode();
        }

        // GPS Tracking
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                currentSpeed = speed ? Math.round(speed * 3.6) : 0;

                speedEl.textContent = currentSpeed;
                speedEl.style.color = (currentSpeed > 110) ? '#ff3366' : '#00ff41';

                updateMap(latitude, longitude);
            }, () => {}, { 
                enableHighAccuracy: true, 
                maximumAge: 1200, 
                timeout: 5000 
            });
        }

        preload();

        // Background memory cleanup
        setInterval(() => cleanMemory(hidden), 180000); // every 3 minutes
    </script>
</body>
</html>
