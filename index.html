<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla Smooth</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
        #container { width:100%; height:100vh; position:relative; }
        iframe {
            position: absolute; top:0; left:0; width:100%; height:100%;
            border:none;
            transition: opacity 0.4s ease-in-out;
            will-change: opacity;
            transform: translateZ(0);
        }
        .hidden { opacity: 0; z-index: 1; pointer-events: none; }
        .visible { opacity: 1; z-index: 2; }
        #speed {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 8px 25px;
            border-radius: 50px; font-size: 32px; font-weight: bold; z-index: 100;
            border: 2px solid #222; pointer-events: none;
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
        #status {
            position: absolute; top: 10px; left: 10px; color: #aaa; font-size: 12px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container">
        <iframe id="wazeA" class="visible" src="about:blank"></iframe>
        <iframe id="wazeB" class="hidden" src="about:blank"></iframe>
        <div id="speed">0</div>
        <div id="status">Initializing...</div>
    </div>

    <script>
        let active = document.getElementById('wazeA');
        let hidden = document.getElementById('wazeB');
        const speedEl = document.getElementById('speed');
        const statusEl = document.getElementById('status');

        let lastLat = 43.65;
        let lastLon = -79.38;
        let lastUpdate = 0;
        const UPDATE_INTERVAL = 6000;   // 6 seconds
        const MIN_DISTANCE = 80;        // meters (slightly more forgiving)

        function distance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function buildUrl(lat, lon) {
            return `https://embed.waze.com/iframe?zoom=16&lat=${lat.toFixed(6)}&lon=${lon.toFixed(6)}&pin=1&ct=livemap&language_code=en`;
        }

        function forceRefreshIframe(iframe) {
            iframe.src = 'about:blank';
            // Small delay helps Tesla browser actually reload next src
            setTimeout(() => {
                iframe.src = buildUrl(lastLat, lastLon);
            }, 50);
        }

        function swapIframes() {
            [active, hidden] = [hidden, active];
            active.className = 'visible';
            hidden.className = 'hidden';
        }

        function updateMap(lat, lon) {
            const now = Date.now();
            if (now - lastUpdate < UPDATE_INTERVAL) return;

            const dist = distance(lastLat, lastLon, lat, lon);
            if (dist < MIN_DISTANCE) return;

            statusEl.textContent = `Updating map... (${dist.toFixed(0)}m)`;

            // Load into hidden
            hidden.src = buildUrl(lat, lon);

            const timeout = setTimeout(() => {
                // Fallback if onload never fires (common in Tesla)
                console.log("onload timeout → forcing swap");
                swapIframes();
                lastLat = lat;
                lastLon = lon;
                lastUpdate = now;
                localStorage.setItem('lastWazeLat', lat);
                localStorage.setItem('lastWazeLon', lon);
                statusEl.textContent = 'Map updated (forced)';
            }, 4500);

            hidden.onload = () => {
                clearTimeout(timeout);
                swapIframes();
                lastLat = lat;
                lastLon = lon;
                lastUpdate = now;
                localStorage.setItem('lastWazeLat', lat);
                localStorage.setItem('lastWazeLon', lon);
                statusEl.textContent = 'Map updated';
            };

            hidden.onerror = () => {
                clearTimeout(timeout);
                console.warn("Waze load error");
                statusEl.textContent = 'Waze load failed';
                forceRefreshIframe(hidden);
            };
        }

        // Preload last position
        function preload() {
            const savedLat = localStorage.getItem('lastWazeLat');
            const savedLon = localStorage.getItem('lastWazeLon');
            if (savedLat && savedLon) {
                lastLat = parseFloat(savedLat);
                lastLon = parseFloat(savedLon);
            }
            active.src = buildUrl(lastLat, lastLon);
            statusEl.textContent = 'Loaded last position';
        }

        // Main geolocation
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                speedEl.textContent = kmh;

                updateMap(latitude, longitude);
            }, 
            err => {
                console.error('Geo error:', err);
                statusEl.textContent = `Geo error: ${err.code}`;
            }, 
            { 
                enableHighAccuracy: true, 
                maximumAge: 800, 
                timeout: 8000 
            });
        }

        // Start
        preload();

        // Occasional forced refresh every 45s as safety net
        setInterval(() => {
            if (Date.now() - lastUpdate > 45000) {
                forceRefreshIframe(active);
                statusEl.textContent = 'Forced full refresh';
            }
        }, 45000);
    </script>
</body>
</html>
