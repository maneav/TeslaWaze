<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla Smooth</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
        #container { width:100%; height:100vh; position:relative; background:#000; }

        iframe {
            position: absolute; top:0; left:0; width:100%; height:100%;
            border:none;
            background:#000;
            transition: opacity 0.3s ease-in-out;
            will-change: opacity;
        }

        .visible { opacity: 1; z-index: 5; visibility: visible; }
        .hidden  { opacity: 0; z-index: 1; visibility: visible; }

        #speed {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 8px 25px;
            border-radius: 50px; font-size: 32px; font-weight: bold; z-index: 100;
            border: 2px solid #222; pointer-events: none;
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
        #status {
            position: absolute; top: 10px; left: 10px; color: #aaa; font-size: 12px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container">
        <iframe id="wazeA" class="visible" src="about:blank" allow="geolocation"></iframe>
        <iframe id="wazeB" class="hidden"  src="about:blank" allow="geolocation"></iframe>
        <div id="speed">0</div>
        <div id="status">Initializing...</div>
    </div>

    <script>
        let active = document.getElementById('wazeA');
        let hidden = document.getElementById('wazeB');
        const speedEl = document.getElementById('speed');
        const statusEl = document.getElementById('status');

        let lastLat = 43.65;
        let lastLon = -79.38;
        let lastUpdate = 0;
        let isUpdating = false;

        const UPDATE_INTERVAL = 6000;
        const MIN_DISTANCE = 80;

        // Force dark mode via prefers-color-scheme + Waze-friendly params
        function buildUrl(lat, lon) {
            const ts = Date.now(); // cache busting for memory/performance
            return `https://embed.waze.com/iframe?zoom=16&lat=${lat.toFixed(6)}&lon=${lon.toFixed(6)}&pin=1&ct=livemap&language_code=en&darkmode=1&ts=${ts}`;
        }

        function distance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function cleanIframe(iframe) {
            if (iframe) {
                iframe.src = 'about:blank';
                // Force garbage collection hint
                try { iframe.contentWindow?.location?.replace('about:blank'); } catch(e){}
            }
        }

        function executeSwap(lat, lon, statusMsg) {
            hidden.className = 'visible';

            setTimeout(() => {
                active.className = 'hidden';
                cleanIframe(active); // unload old content from memory

                [active, hidden] = [hidden, active];

                lastLat = lat;
                lastLon = lon;
                lastUpdate = Date.now();
                isUpdating = false;

                localStorage.setItem('lastWazeLat', lat);
                localStorage.setItem('lastWazeLon', lon);
                statusEl.textContent = statusMsg;
            }, 300);
        }

        function updateMap(lat, lon) {
            const now = Date.now();
            if (isUpdating || (now - lastUpdate < UPDATE_INTERVAL)) return;

            const dist = distance(lastLat, lastLon, lat, lon);
            if (dist < MIN_DISTANCE) return;

            isUpdating = true;
            statusEl.textContent = 'Rendering...';

            hidden.src = buildUrl(lat, lon);

            const timeout = setTimeout(() => {
                executeSwap(lat, lon, 'Updated (Forced)');
            }, 7000);

            hidden.onload = () => {
                clearTimeout(timeout);
                setTimeout(() => {
                    executeSwap(lat, lon, 'Map updated');
                }, 600);
            };
        }

        function preload() {
            const savedLat = localStorage.getItem('lastWazeLat');
            const savedLon = localStorage.getItem('lastWazeLon');
            if (savedLat && savedLon) {
                lastLat = parseFloat(savedLat);
                lastLon = parseFloat(savedLon);
            }
            active.src = buildUrl(lastLat, lastLon);
            lastUpdate = Date.now();
        }

        // Geolocation + speed
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                speedEl.textContent = speed ? Math.round(speed * 3.6) : 0;
                updateMap(latitude, longitude);
            }, () => {}, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // Auto dark mode + Tesla compatibility
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        function applyDarkMode() {
            document.documentElement.style.setProperty('color-scheme', 'dark');
        }
        darkModeMedia.addEventListener('change', applyDarkMode);
        applyDarkMode();

        // Initialize
        preload();

        // Periodic memory cleanup every 10 minutes
        setInterval(() => {
            cleanIframe(hidden);
        }, 10 * 60 * 1000);
    </script>
</body>
</html>
