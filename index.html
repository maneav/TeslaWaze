<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
        #container { width:100%; height:100vh; position:relative; }
        iframe { width:100%; height:100%; border:none; }
        
        #controls {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 100;
            background: rgba(0,0,0,0.85); padding: 12px; border-radius: 12px;
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; min-width: 200px; }
        button {
            padding: 12px 18px; border: none; border-radius: 8px; background: #cc0000;
            color: white; font-size: 16px; cursor: pointer;
        }
        button:hover { background: #ff0000; }

        #status {
            position: absolute; bottom: 80px; left: 15px; background: rgba(0,0,0,0.85);
            color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 15px; z-index: 100;
        }
        #speed {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #00ff00; padding: 10px 30px;
            border-radius: 50px; font-size: 26px; font-weight: bold; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="controls">
            <input type="text" id="search" placeholder="Search destination (address, city...)" />
            <button onclick="goToDestination()">🚗 Go</button>
            <button onclick="recenter()">📍 Recenter</button>
        </div>
        
        <iframe id="waze" 
                src="https://embed.waze.com/iframe?zoom=15&lat=43.65&lon=-79.38&pin=1" 
                allowfullscreen>
        </iframe>
        
        <div id="status">Waiting for Tesla GPS...</div>
        <div id="speed">0 km/h</div>
    </div>

    <script>
        const iframe = document.getElementById('waze');
        const status = document.getElementById('status');
        const speedEl = document.getElementById('speed');
        const searchInput = document.getElementById('search');

        let lastLat = null, lastLon = null, lastTime = null;
        let currentZoom = 16;

        function updateMap(lat, lon, zoom = null) {
            const z = zoom || currentZoom;
            iframe.src = `https://embed.waze.com/iframe?zoom=${z}&lat=${lat}&lon=${lon}&pin=1`;
            status.textContent = `Live • ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        }

        function calcSpeed(lat1, lon1, lat2, lon2, dt) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const km = R * c;
            return (km / (dt / 3600000)).toFixed(0);
        }

        function autoZoom(speed) {
            if (speed < 30) currentZoom = 17;      // Slow city
            else if (speed < 60) currentZoom = 16;
            else if (speed < 90) currentZoom = 15;
            else currentZoom = 14;                 // Highway
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const now = pos.timestamp;
                const speed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : null; // m/s → km/h

                // Update map with auto zoom
                if (lastLat) {
                    const calculatedSpeed = calcSpeed(lastLat, lastLon, lat, lon, now - lastTime);
                    const displaySpeed = speed || calculatedSpeed;
                    speedEl.textContent = `${displaySpeed} km/h`;
                    autoZoom(parseFloat(displaySpeed));
                }

                updateMap(lat, lon);

                lastLat = lat;
                lastLon = lon;
                lastTime = now;

            }, err => {
                status.textContent = "❌ Allow Location Access in Tesla Browser";
            }, {
                enableHighAccuracy: true,
                maximumAge: 1500,
                timeout: 8000
            });
        }

        // Manual Recenter
        function recenter() {
            if (lastLat && lastLon) {
                updateMap(lastLat, lastLon, 16);
            }
        }

        // Search + Route
        function goToDestination() {
            const query = searchInput.value.trim();
            if (!query) return alert("Enter a destination");

            // Open Waze navigation in new tab (works better in Tesla browser)
            const wazeUrl = `https://www.waze.com/ul?navigate=yes&q=${encodeURIComponent(query)}`;
            window.open(wazeUrl, '_blank');
        }

        // Allow pressing Enter in search box
        searchInput.addEventListener("keypress", e => {
            if (e.key === "Enter") goToDestination();
        });
    </script>
</body>
</html>
