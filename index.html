<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; }
        #container { width:100%; height:100vh; position:relative; }
        iframe { width:100%; height:100%; border:none; }
        #status {
            position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.85);
            color:#fff; padding:12px 20px; border-radius:12px; z-index:100;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="status">Waiting for GPS...</div>
        <iframe id="waze" src="https://embed.waze.com/iframe?zoom=16&lat=43.65&lon=-79.38&pin=1" allowfullscreen></iframe>
    </div>

    <script>
        const iframe = document.getElementById('waze');
        const status = document.getElementById('status');
        let lastUpdate = 0;

        function updateMap(lat, lon) {
            const now = Date.now();
            if (now - lastUpdate < 1500) return; // Limit updates to max once every 1.5 seconds (prevents too many reloads)
            
            iframe.src = `https://embed.waze.com/iframe?zoom=17&lat=${lat}&lon=${lon}&pin=1`;
            status.textContent = `Live • ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            lastUpdate = now;
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                updateMap(pos.coords.latitude, pos.coords.longitude);
            }, err => {
                status.textContent = "GPS Error – Allow location access";
            }, {
                enableHighAccuracy: true,
                maximumAge: 1000,
                timeout: 5000
            });
        }
    </script>
</body>
</html>
