<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waze Live • Tesla Smooth</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; overflow:hidden; background:#000; font-family: sans-serif; }
        #container { width:100%; height:100vh; position:relative; }
        
        /* Smooth transition for the swap */
        iframe { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            border:none; transition: opacity 0.4s ease-in-out; 
        }
        .hidden { opacity: 0; z-index: 1; pointer-events: none; }
        .visible { opacity: 1; z-index: 2; }
        
        #controls {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px;
            display: flex; gap: 8px;
        }
        button {
            padding: 10px 15px; border: none; border-radius: 8px; background: #333;
            color: white; font-size: 14px; cursor: pointer; border: 1px solid #444;
        }
        #status {
            position: absolute; bottom: 85px; left: 15px; background: rgba(0,0,0,0.7);
            color: #ccc; padding: 6px 12px; border-radius: 8px; font-size: 12px; z-index: 100;
        }
        #speed {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 8px 25px;
            border-radius: 50px; font-size: 32px; font-weight: bold; z-index: 100;
            border: 2px solid #222;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="controls">
            <button id="pauseBtn" onclick="togglePause()">⏸️ Pause</button>
            <button onclick="recenter()">📍 Recenter</button>
        </div>
        
        <!-- Double Buffer Iframes -->
        <iframe id="wazeA" class="visible" src="about:blank"></iframe>
        <iframe id="wazeB" class="hidden" src="about:blank"></iframe>
        
        <div id="status">Connecting to GPS...</div>
        <div id="speed">0</div>
    </div>

    <script>
        let activeIframe = document.getElementById('wazeA');
        let hiddenIframe = document.getElementById('wazeB');
        const status = document.getElementById('status');
        const speedEl = document.getElementById('speed');

        let lastLat = 43.65, lastLon = -79.38; // Default coords
        let isPaused = false;
        let lastUpdate = 0;
        const UPDATE_INTERVAL = 8000; // 8 seconds is safer for Tesla's CPU

        function updateMap(lat, lon) {
            const now = Date.now();
            if (isPaused || (now - lastUpdate < UPDATE_INTERVAL)) return;

            // Load the new location into the HIDDEN iframe
            hiddenIframe.src = `https://embed.waze.com/iframe?zoom=16&lat=${lat}&lon=${lon}&pin=1`;

            // Wait for it to finish loading before swapping
            hiddenIframe.onload = () => {
                // Swap classes
                hiddenIframe.className = 'visible';
                activeIframe.className = 'hidden';

                // Swap variable references
                let temp = activeIframe;
                activeIframe = hiddenIframe;
                hiddenIframe = temp;
                
                status.textContent = `Live • ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                lastUpdate = Date.now();
            };
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                
                // Use car's native speed (m/s) if available, else 0
                const kmh = speed ? (speed * 3.6).toFixed(0) : "0";
                speedEl.textContent = kmh;

                lastLat = latitude;
                lastLon = longitude;
                updateMap(latitude, longitude);
                
            }, err => {
                status.textContent = "GPS Error: " + err.message;
            }, { enableHighAccuracy: true, maximumAge: 1000 });
        }

        function recenter() {
            updateMap(lastLat, lastLon);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️ Resume' : '⏸️ Pause';
            status.textContent = isPaused ? 'Tracking PAUSED' : 'Live';
        }

        // Initial Load
        recenter();
    </script>
</body>
</html>
